name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 👇 ЭТОТ ШАГ ИСПРАВЛЯЕТ ОШИБКУ 126
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build WASM distribution
        run: ./gradlew :webApp:wasmJsBrowserDistribution --no-daemon

      - name: Verify build output
        run: |
          echo "=== Contents of productionExecutable ==="
          ls -la webApp/build/dist/wasmJs/productionExecutable/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'webApp/build/dist/wasmJs/productionExecutable'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4